name: Metrics

on:
  # Rebuild the cards once a day, plus on demand.
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Main dashboard: header, activity, isocalendar, languages.
      - name: Overview card
        uses: lowlighter/metrics@latest
        with:
          # Create a classic PAT and store it as the METRICS_TOKEN secret for
          # private contributions and full language stats. Falls back to the
          # built-in token so the card still renders without it.
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: hamidfzm
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Istanbul
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8

      # Coding habits: when and how you commit.
      - name: Habits card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: hamidfzm
          filename: github-metrics-habits.svg
          base: ""
          config_timezone: Europe/Istanbul
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
